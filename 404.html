<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Loading - OpenRockets Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .wrap { max-width: 520px; width: 100%; }
    .gif-wrap { margin: 0 auto 2rem; max-width: 320px; }
    .gif-wrap img { width: 100%; border-radius: 12px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; }
    p { color: rgba(255,255,255,0.5); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: #3b82f6;
      color: white;
      padding: 0.75rem 2.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    a:hover { background: #2563eb; }
    .brand { margin-top: 2.5rem; opacity: 0.3; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="gif-wrap">
      <img src="https://media.giphy.com/media/QMHoU66sBXqqLqYvGO/giphy.gif" alt="Error" />
    </div>
    <h1>Error while loading this app</h1>
    <p>Something went wrong while trying to load this page. Head back to the OpenRockets Apps store.</p>
    <a href="https://apps.openrockets.com/app/quackers" onclick="if(window.top!==window){window.top.location.href='https://apps.openrockets.com/app/quackers';return false;}">Return to App Store</a>
    <p class="brand">OpenRockets Apps</p>
  </div>
</body>
</html>
